name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn package -DskipTests -q

      - name: Download Launch4j from GitHub
        run: |
          curl -L "https://github.com/AdoptOpenJDK/Launch4j-releases/releases/download/v3.50/launch4j-3.50-windowsamd64.zip" -o launch4j.zip
          Expand-Archive -Path "launch4j.zip" -DestinationPath "launch4j" -Force
          Copy-Item -Path "launch4j\launch4j-3.50-windowsamd64\*" -Destination "launch4j\bin" -Recurse -Force

      - name: Create Launch4j config
        shell: pwsh
        run: |
          @"
          <launch4j configFileVersion="1.5">
            <headerType>gui</headerType>
            <jar>configgen-1.0.0.jar</jar>
            <outfile>QCloudConfigGen.exe</outfile>
            <jre>
              <path>.</path>
              <minVersion>17</minVersion>
            </jre>
            <versionInfo>
              <fileVersion>1.0.0</fileVersion>
              <productVersion>1.0.0</productVersion>
              <companyName>QCloud</companyName>
              <productName>QCloudConfigGen</productName>
            </versionInfo>
          </launch4j>
          "@ | Out-File -Encoding ASCII launch4j.xml

      - name: Build EXE with Launch4j
        run: |
          java -jar launch4j/bin/launch4j.jar launch4j.xml

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: QCloudConfigGen-windows-exe
          path: QCloudConfigGen.exe