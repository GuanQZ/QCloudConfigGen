name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn package -DskipTests -q

      - name: Create custom JRE with jlink
        run: |
          $jlink = "$env:JAVA_HOME\bin\jlink.exe"
          & $jlink --output runtime-image --add-modules java.base,java.compiler,java.datatransfer,java.desktop,java.instrument,java.logging,java.management,java.naming,java.net.http,java.prefs,java.scripting,java.security.sasl,java.smartcardio,java.sql.rowset,java.xml.crypto,java.activation,java.logging,java.management.rmi,java.transaction.xa,java.sql,java.xml,java.rmi,java.security.jgss,java.se,java.datatransfer --strip-debug --compress=2 --no-header-files --no-man-pages

      - name: Build Windows EXE with jpackage
        run: |
          jpackage --type app-image --input target --dest dist --name QCloudConfigGen --main-jar configgen-1.0.0.jar --app-version "1.0.0" --vendor "QCloud" --runtime-image runtime-image

      - name: Zip app-image for distribution
        run: |
          Compress-Archive -Path "dist/QCloudConfigGen" -DestinationPath "dist/QCloudConfigGen.zip" -Force

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: QCloudConfigGen-windows-exe
          path: dist/QCloudConfigGen.zip