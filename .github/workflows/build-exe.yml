name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn package -DskipTests -q

      - name: Download and setup Launch4j
        run: |
          $url = "https://sourceforge.net/projects/launch4j/files/launch4j-3.50/launch4j-3.50-windowsamd64.zip/download"
          $output = "launch4j.zip"
          $headers = @{ "User-Agent" = "Mozilla/5.0" }
          Invoke-WebRequest -Uri $url -OutFile $output -Headers $headers -UseBasicParsing
          Expand-Archive -Path $output -DestinationPath "launch4j" -Force
          Get-ChildItem -Path "launch4j" -Recurse | Where-Object { $_.Name -match "^launch4j" -and $_.Name -match "\.jar$" } | Select-Object -First 1

      - name: Create Launch4j config
        shell: pwsh
        run: |
          $xml = @"
          <launch4j configFileVersion="1.5">
            <headerType>gui</headerType>
            <jar>configgen-1.0.0.jar</jar>
            <outfile>QCloudConfigGen.exe</outfile>
            <jre>
              <path>.</path>
              <minVersion>17</minVersion>
            </jre>
            <versionInfo>
              <fileVersion>1.0.0</fileVersion>
              <productVersion>1.0.0</productVersion>
              <companyName>QCloud</companyName>
              <productName>QCloudConfigGen</productName>
            </versionInfo>
          </launch4j>
          "@
          $xml | Out-File -Encoding ASCII launch4j.xml

      - name: Build EXE with Launch4j
        run: |
          $launch4j = Get-ChildItem -Path "launch4j" -Recurse -Filter "launch4j*.jar" | Select-Object -First 1
          java -jar $launch4j.FullName launch4j.xml

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: QCloudConfigGen-windows-exe
          path: QCloudConfigGen.exe